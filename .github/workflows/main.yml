name: PlatformIO CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: Compile Firmware and Build FS
      run: |
        pio run
        pio run --target buildfs

    - name: Merge Binaries to One Factory Flash Image
      run: |
        python -m pip install esptool
        # Зливає всі частини (завантажувач, таблицю розділів, код та FS) в один файл для адреси 0x0
        # Шляхи налаштовані під стандартну структуру lolin_c3_mini в PlatformIO
        esptool.py --chip esp32c3 merge_bin \
          -o .pio/build/lolin_c3_mini/factory.bin \
          --flash_mode dio \
          --flash_size 4MB \
          0x0 .pio/build/lolin_c3_mini/firmware.bin

    - name: Upload Complete Factory Binary
      uses: actions/upload-artifact@v4
      with:
        name: esp32-drawing-robot-factory-bin
        path: .pio/build/lolin_c3_mini/factory.bin
